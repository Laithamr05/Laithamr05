<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140">
  <style>
    .bubble { fill: #1f8fff; }
    .text {
      font: 700 28px "Helvetica Neue", Helvetica, Arial, sans-serif;
      fill: #ffffff;
      letter-spacing: 0.2px;
    }

    .p1 { animation: phase1 9s steps(20, end) infinite; }
    .p2 { animation: phase2 9s steps(22, end) infinite; }
    .p3 { animation: phase3 9s steps(18, end) infinite; }

    @keyframes phase1 {
      0%   { width: 0; }
      11%  { width: 460px; }
      33%  { width: 460px; }
      34%  { width: 0; }
      100% { width: 0; }
    }
    @keyframes phase2 {
      0%, 33%  { width: 0; }
      44%      { width: 460px; }
      66%      { width: 460px; }
      67%      { width: 0; }
      100%     { width: 0; }
    }
    @keyframes phase3 {
      0%, 66%  { width: 0; }
      77%      { width: 460px; }
      99%      { width: 460px; }
      100%     { width: 0; }
    }
  </style>

  <g>
    <rect x="20" y="20" width="480" height="90" rx="45" class="bubble"/>
    <path d="M 58 92 Q 42 120 12 128 Q 42 112 52 90 Z" class="bubble"/>
  </g>

  <defs>
    <clipPath id="c1"><rect class="p1" x="0" y="0" width="0" height="140"/></clipPath>
    <clipPath id="c2"><rect class="p2" x="0" y="0" width="0" height="140"/></clipPath>
    <clipPath id="c3"><rect class="p3" x="0" y="0" width="0" height="140"/></clipPath>
  </defs>

  <g clip-path="url(#c1)">
    <text x="55" y="73" class="text">hey, i'm laith 👋</text>
  </g>
  <g clip-path="url(#c2)">
    <text x="55" y="73" class="text">cs student @ birzeit</text>
  </g>
  <g clip-path="url(#c3)">
    <text x="55" y="73" class="text">building stuff in sql</text>
  </g>
</svg>
